name: nginx-router
services:
  nginx:
    build: .
    environment:
      CERTBOT_EMAIL: $CERTBOT_EMAIL
      CERTBOT_AUTHENTICATOR: webroot
      CERTBOT_DNS_PROPAGATION_SECONDS: ""
      RENEWAL_INTERVAL: 8d
      STAGING: 0
      DHPARAM_SIZE: 2048
      ELLIPTIC_CURVE: secp256r1
      RSA_KEY_SIZE: 2048
      USE_ECDSA: 1
      USE_LOCAL_CA: $LOCAL_CA
      DEBUG: 0
    volumes:
      $VOLUMES
      - $NGINX_SECRETS:/etc/letsencrypt
    $NETWORK
    restart: unless-stopped
